version: "3.8"

services:
  minecraft:
    image: itzg/minecraft-server
    ports:
      - "25565:25565"
    environment:
      EULA: "TRUE"
      TYPE: "VANILLA"
      VERSION: "1.20.4"
      MEMORY: "2G"
      ONLINE_MODE: "FALSE"
      DIFFICULTY: "normal"
      GAMEMODE: "survival"
      MAX_PLAYERS: "20"
      VIEW_DISTANCE: "10"
      SPAWN_PROTECTION: "0"
      ENABLE_COMMAND_BLOCK: "true"
      SNOOPER_ENABLED: "false"
      MOTD: "living-system bot world"
    volumes:
      - minecraft-data:/data
    restart: unless-stopped
    healthcheck:
      test: mc-health
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s

volumes:
  minecraft-data:
